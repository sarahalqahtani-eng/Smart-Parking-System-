<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservation · Smart Parking</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Hero banner -->
  <section class="hero-banner">
    <img src="assets/parking-banner.jpg" alt="Parking" loading="lazy">
    <div class="hero-shape hero-shape-1"></div>
    <div class="hero-shape hero-shape-2"></div>

    <div class="hero-content">
      <div class="hero-tagline" data-i18n="reservation_label">
        Reserve a Spot
      </div>

      <h1 class="hero-title" data-i18n="reservation_title">
        Book Your Parking
      </h1>

      <p class="hero-subtitle" data-i18n="reservation_subtitle">
        Fill in your details and pick an available spot.
      </p>
    </div>
  </section>

  <!-- Reservation form -->
  <section class="section" id="reservation-form-section">
    <div class="container">

      <form class="form-card" id="reservation-form">

        <div class="form-row">

          <div class="form-group">
            <label class="form-label" for="full-name" data-i18n="full_name">
              Full Name
            </label>

            <input
              type="text"
              class="form-input"
              id="full-name"
              required
              data-i18n-ph="full_name_ph"
              placeholder="e.g. Sara Al-Mutairi"
            >
          </div>

          <div class="form-group">
            <label class="form-label" for="phone" data-i18n="phone">
              Phone Number
            </label>

            <input
              type="tel"
              class="form-input"
              id="phone"
              required
              data-i18n-ph="phone_ph"
              placeholder="05XXXXXXXX"
            >
          </div>

        </div>

        <div class="form-row">

          <div class="form-group">
            <label class="form-label" for="plate" data-i18n="plate">
              License Plate
            </label>

            <input
              type="text"
              class="form-input"
              id="plate"
              required
              data-i18n-ph="plate_ph"
              placeholder="e.g. ABC 1234"
            >
          </div>

          <div class="form-group">
            <label class="form-label" for="duration" data-i18n="duration">
              Duration
            </label>

            <select class="form-select" id="duration">
              <option value="30" data-i18n="duration_30">
                30 minutes
              </option>

              <option value="60" data-i18n="duration_60" selected>
                1 hour
              </option>

              <option value="120" data-i18n="duration_120">
                2 hours
              </option>

              <option value="240" data-i18n="duration_240">
                4 hours
              </option>
            </select>
          </div>

        </div>

        <div class="form-group">
          <label class="form-label" data-i18n="select_spot">
            Select a Spot
          </label>

          <div class="spot-selector" id="spot-selector"></div>
        </div>

        <button
          type="submit"
          class="btn btn-primary btn-block btn-lg"
          data-i18n="confirm_reservation"
        >
          Confirm Reservation
        </button>

      </form>

    </div>
  </section>

  <!-- Gate control -->
  <section class="section" id="gate-control-section" style="display:none;">

    <div class="container">

      <div class="form-card" style="text-align:center;">

        <span class="section-label" data-i18n="gate_control">
          Gate Control
        </span>

        <h2 class="section-title" style="margin-top:14px;">
          <span data-i18n="spot_a1">Spot</span>

          <span id="gate-spot-name" style="color:var(--sky-600);">
            A1
          </span>
        </h2>

        <div class="gate-control">

          <div class="gate-icon-large" id="gate-icon-large">
            ⏳
          </div>

          <div class="gate-status-display" id="gate-status-display">
            —
          </div>

          <div class="btn-group" style="justify-content:center;">

            <button
              class="btn btn-success btn-lg"
              id="btn-open"
              data-i18n="open_parking"
            >
              Open Parking
            </button>

            <button
              class="btn btn-danger btn-lg"
              id="btn-lock"
              data-i18n="lock_parking"
            >
              Lock Parking
            </button>

          </div>

        </div>

        <button
          class="btn btn-outline"
          id="btn-new-reservation"
          style="margin-top:24px;"
        >
          ↺ New Reservation
        </button>

      </div>

    </div>

  </section>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/translations.js"></script>
  <script src="js/config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/reservation.js"></script>

</body>
</html>
